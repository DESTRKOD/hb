<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <title>🎂 День рождения Маши</title>
  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body, html { margin:0; padding:0; height:100%; background:#000; overflow:hidden; font-family:sans-serif; }
    #book { width:100vw; height:100vh; background:#222; }
    .page { 
      width:100%; height:100%; padding:25px; box-sizing:border-box;
      background:#f8f1e3; color:#222; font-size:17px; line-height:1.35;
      display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center;
      border:1px solid #ddd; box-shadow:inset 0 0 50px rgba(0,0,0,0.15);
    }
    .page img { max-width:96%; border:5px solid #333; border-radius:12px; }
    .bubble { background:#fff; padding:15px 22px; border-radius:40px; border:4px solid #222; margin:15px 0; font-size:18px; }
    button { position:fixed; bottom:15px; padding:12px 20px; font-size:18px; border:none; border-radius:50px; color:white; z-index:999; }
    #prev { left:20px; background:#666; }
    #next { right:20px; background:#ff4d94; }
    #hint { position:fixed; top:10px; left:50%; transform:translateX(-50%); color:#aaa; font-size:14px; background:rgba(0,0,0,0.6); padding:5px 15px; border-radius:20px; z-index:1000; }
  </style>
</head>
<body>

<div id="hint">👉 Тяни за угол страницы пальцем • работает на iPhone</div>

<div id="book">
  <!-- страницы как раньше, можешь оставить свои -->
  <div class="page" data-density="hard">... твоя обложка ...</div>
  <div class="page">... страница 1 ...</div>
  <div class="page">... страница 2 ...</div>
  <!-- добавляй сколько угодно -->
</div>

<button id="prev">◀ Назад</button>
<button id="next">Следующая ▶</button>

<script>
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();

  const book = document.getElementById('book');
  let pageFlip;   // ← теперь видно везде

  function initBook() {
    pageFlip = new PageFlip(book, {
      width: 400,
      height: 620,
      size: "stretch",
      drawShadow: true,
      flippingTime: 850,
      maxShadowOpacity: 0.7,
      showCover: true,
      mobileScrollSupport: true,
      useMouseEvents: true,
      usePortrait: true,
      startPage: 0
    });

    pageFlip.loadFromHTML(document.querySelectorAll('.page'));

    // Кнопки работают 100%
    document.getElementById('next').addEventListener('click', () => pageFlip.flipNext());
    document.getElementById('prev').addEventListener('click', () => pageFlip.flipPrev());

    console.log('✅ Книжка загружена! Страниц:', pageFlip.getPageCount());
  }

  // Запускаем после полной загрузки
  window.onload = initBook;
</script>

</body>
</html>
